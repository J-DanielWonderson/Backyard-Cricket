<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cricket Proof System - Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-bg: radial-gradient(circle at 50% 15%, #071f13, #020604);
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --cricket-green: #00b355;
      --cricket-green-glow: rgba(0, 179, 85, 0.3);
      --gold: #ffd700;
      --gold-glow: rgba(255, 215, 0, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--primary-bg);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 450px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .stadium-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 179, 85, 0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px 24px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6);
      z-index: 10;
      text-align: center;
      animation: cardFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      font-size: 4rem;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      line-height: 1.1;
      letter-spacing: 1.5px;
      background: linear-gradient(135deg, #ffffff 30%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 15px rgba(0,0,0,0.6);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .role-buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
    }

    .btn-role {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 20px;
      color: white;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      text-align: left;
    }

    .btn-role:hover, .btn-role:active {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-role.scorer:hover, .btn-role.scorer:active {
      border-color: var(--cricket-green);
      box-shadow: 0 8px 24px var(--cricket-green-glow);
    }

    .btn-role.camera:hover, .btn-role.camera:active {
      border-color: var(--gold);
      box-shadow: 0 8px 24px var(--gold-glow);
    }

    .role-icon {
      font-size: 2.2rem;
      margin-right: 18px;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
    }

    .role-text-group {
      display: flex;
      flex-direction: column;
    }

    .role-title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .role-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 300;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="stadium-glow"></div>

  <div class="app-container">
    <div class="card">
      <span class="logo">🏏</span>
      <h1>Backyard Proof</h1>
      <p class="subtitle">2-Phone Video Verification System</p>

      <div class="role-buttons">
        <a href="scorer.html" class="btn-role scorer">
          <span class="role-icon">📊</span>
          <div class="role-text-group">
            <span class="role-title">Scorer Device</span>
            <span class="role-desc">Main scoring interface & P2P receiver</span>
          </div>
        </a>

        <a href="cam.html" class="btn-role camera">
          <span class="role-icon">🎥</span>
          <div class="role-text-group">
            <span class="role-title">Camera Device</span>
            <span class="role-desc">Ball clip recorder & OneDrive archiver</span>
          </div>
        </a>
      </div>

      <div class="footer">
        1v1 Backyard Cricket Edition
      </div>
    </div>
  </div>

</body>
</html>
